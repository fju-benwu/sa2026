name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure Git user
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: npm ci

      - name: Build and collect export
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyC08pfdUHWT4-QUWuGmKjBicnS7AWRMx7g
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: fju-im-sa.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: fju-im-sa
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: fju-im-sa.firebasestorage.app
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "613242701553"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:613242701553:web:d1ed3e5680025277d64b50"
        run: npm run export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          publish_dir: ./out
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
